<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드 프로필</title>

<style>

/* ===== 전체 ===== */
body {
  margin: 0;
  background: #121212;
  color: #fff;
  font-family: Arial;
}

/* ===== 레이아웃 ===== */
.layout {
  display: flex;
}

.sidebar {
  width: 220px;
  background: #1e1e1e;
  padding: 20px;
}

.menu-title {
  margin-top: 20px;
  font-weight: bold;
}

.menu-item {
  padding: 10px;
  cursor: pointer;
}

.menu-item:hover {
  background: #333;
}

.menu-item.active {
  background: #444;
}

.content {
  flex: 1;
  padding: 30px;
}

/* ===== 카드 영역 ===== */
#cardContainer {
  display: grid;
  grid-template-columns: repeat(5, 220px);
  gap: 20px;
  justify-content: center;
}

/* ===== 카드 ===== */
.card {
  width: 220px;
  height: 300px;
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front,
.card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  overflow: hidden;
  backface-visibility: hidden;
}

/* 이미지 */
.card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🔴 레벨 */
.level {
  position: absolute;
  top: 12px;
  left: 12px;
  color: #ff4d4d;
  font-weight: bold;
}

/* 🟢 토벌 */
.grade {
  position: absolute;
  top: 12px;
  right: 12px;
  color: #4dff88;
  font-weight: bold;
}

/* 🔵 닉네임 */
.name {
  position: absolute;
  bottom: 28px;
  width: 100%;
  text-align: center;
  color: #4db8ff;
  font-size: 18px;
}

/* ===== 뒷면 ===== */
.card-back {
  background: #222;
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

/* ===== 검색 ===== */
.search-box {
  margin-bottom: 20px;
}

.search-box input {
  background: #222;
  border: 1px solid #444;
  color: white;
  padding: 5px;
}

.search-box button {
  background: #444;
  color: white;
  border: none;
  padding: 6px 10px;
}

/* ===== 더보기 ===== */
#loadMoreBtn {
  margin: 30px auto;
  display: block;
  padding: 10px 20px;
  background: #444;
  border: none;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="layout">

  <!-- 메뉴 -->
  <div class="sidebar">
    <div class="menu-title">결사원</div>
    <div class="menu-item" onclick="location.href='index.html'">전체보기</div>

    <div class="menu-title">카드</div>
    <div class="menu-item active">카드 프로필</div>
  </div>

  <!-- 컨텐츠 -->
  <div class="content">

    <h1>카드 프로필</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="닉네임 검색">
      <button onclick="searchCard()">검색</button>
    </div>

    <div id="cardContainer"></div>

    <button id="loadMoreBtn" onclick="loadMore()">더보기</button>

  </div>

</div>

<script>

let originalData = [];
let filteredData = [];
let currentIndex = 0;
const pageSize = 20;

async function loadData() {
  const res = await fetch("all_servers_ranking.json");
  originalData = await res.json();
  filteredData = [...originalData];
  renderCards(true);
}

function renderCards(reset = false) {
  const container = document.getElementById("cardContainer");

  if (reset) {
    container.innerHTML = "";
    currentIndex = 0;
  }

  const end = Math.min(currentIndex + pageSize, filteredData.length);

  for (let i = currentIndex; i < end; i++) {
    const p = filteredData[i];

    const card = document.createElement("div");
    card.className = "card";

    const img = `assets_classes/${p.class}_gold.png`;

    card.innerHTML = `
      <div class="card-inner">

        <div class="card-front">
          <img src="${img}">
          <div class="level">Lv.${p.gc_level}</div>
          <div class="grade">${p.grade}</div>
          <div class="name">${p.gc_name}</div>
        </div>

        <div class="card-back">
          <div>${p.guild_name}</div>
          <div>전투력: -</div>
          <div>특징: -</div>
        </div>

      </div>
    `;

    card.onclick = () => card.classList.toggle("flipped");

    container.appendChild(card);
  }

  currentIndex = end;

  document.getElementById("loadMoreBtn").style.display =
    currentIndex >= filteredData.length ? "none" : "block";
}

function loadMore() {
  renderCards();
}

function searchCard() {
  const keyword = document.getElementById("searchInput").value;

  filteredData = originalData.filter(p =>
    p.gc_name.includes(keyword)
  );

  renderCards(true);
}

loadData();

</script>

</body>
</html>
