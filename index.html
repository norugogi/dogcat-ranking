<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DOG & CAT</title>

<style>
body { font-family: Arial; }

.menu-item {
  cursor: pointer;
  padding: 8px;
}
.menu-item.active {
  background: #444;
  color: #fff;
}

#rubyPage { display:none; }
</style>
</head>

<body>

<!-- 메뉴 -->
<div class="menu-title">DOG & CAT 결사원</div>

<div class="menu-item active" onclick="showAll(); menuClick(this)">전체보기</div>
<div class="menu-item" onclick="showDOG(); menuClick(this)">DOG 결사원</div>
<div class="menu-item" onclick="showCAT(); menuClick(this)">CAT 결사원</div>

<div class="menu-title">카드 프로필</div>
<div class="menu-item" onclick="goCards()">카드 프로필 보기</div>

<div class="menu-title">결사 통계</div>
<div class="menu-item" onclick="openStats()">통계 보기</div>

<div class="menu-title">루비 공헌</div>
<div class="menu-item" onclick="showRuby(); menuClick(this)">루비 공헌 순위</div>


<hr>

<!-- 메인 페이지 -->
<div id="mainPage">
  <table border="1">
    <thead>
      <tr>
        <th>결사</th>
        <th>닉네임</th>
        <th>레벨</th>
        <th>직업</th>
        <th>등급</th>
      </tr>
    </thead>
    <tbody id="playerList"></tbody>
  </table>
</div>

<!-- 루비 페이지 -->
<div id="rubyPage">
  <h3>루비 공헌</h3>

  <div>
    그룹:
    <select id="groupFilter">
      <option value="all">전체</option>
      <option value="DOG">DOG</option>
      <option value="CAT">CAT</option>
    </select>

    시즌:
    <select id="seasonFilter"></select>

    주차:
    <select id="weekFilter"></select>
  </div>

  <br>

  <div style="width:300px; background:#ccc;">
    <div id="rubyBar" style="height:20px; background:red; width:0%"></div>
  </div>
  <div id="rubyText"></div>
  <div id="rubyPercent"></div>

  <table border="1">
    <thead>
      <tr>
        <th>순위</th>
        <th>시즌</th>
        <th>주차</th>
        <th>그룹</th>
        <th>닉네임</th>
        <th>총합</th>
        <th>주간</th>
      </tr>
    </thead>
    <tbody id="rubyTable"></tbody>
  </table>
</div>


<script>
/***************************************
 * 🔥 menuClick (안전 버전)
 ***************************************/
function menuClick(el){
  if(!el) return;

  document.querySelectorAll(".menu-item").forEach(e=>{
    e.classList.remove("active");
  });

  el.classList.add("active");
}
</script>

<!-- 기존 JS 그대로 사용 -->
<script src="script.js"></script>
<script src="ruby.js"></script>

</body>
</html>
