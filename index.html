<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DOG & CAT</title>

<style>
body {
  margin: 0;
  font-family: Pretendard, sans-serif;
  background: #1e1f22;
  color: #fff;
}

/* 사이드 */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #111214;
  padding: 20px;
  position: fixed;
}

.menu-title {
  font-size: 13px;
  color: #888;
  margin-top: 20px;
  margin-bottom: 8px;
}

.menu-item {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 6px;
}

.menu-item:hover {
  background: #2a2b30;
}

.menu-item.active {
  background: #d4af37;
  color: #000;
  font-weight: normal;
}

/* 메인 */
.main {
  margin-left: 240px;
  padding: 30px;
}

.title {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

.sub {
  text-align: center;
  color: #aaa;
  margin-bottom: 20px;
}

/* 테이블 */
table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #2a2b30;
}

th, td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #333;
}

tbody tr:hover {
  background: #2a2b30;
}

/* 루비 */
.bar-wrap {
  width: 100%;
  height: 20px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 20px 0;
}

.bar {
  height: 100%;
  background: #ff4d4d;
  width: 0%;
}

.center {
  text-align: center;
  margin-bottom: 10px;
}

select {
  background: #2a2b30;
  color: #fff;
  border: none;
  padding: 6px;
  margin: 0 4px;
}

#rubyPage { display:none; }
</style>
</head>

<body>

<!-- 메뉴 -->
<div class="sidebar">

  <div class="menu-title">DOG & CAT 결사원</div>
  <div class="menu-item active" onclick="showAll(); menuClick(this)">전체보기</div>
  <div class="menu-item" onclick="showDOG(); menuClick(this)">DOG 결사원</div>
  <div class="menu-item" onclick="showCAT(); menuClick(this)">CAT 결사원</div>

  <div class="menu-title">카드 프로필(클릭X)</div>
  <div class="menu-item" onclick="goCards()">카드 프로필</div>

  <div class="menu-title">결사 통계</div>
  <div class="menu-item" onclick="openStats()">통계 보기</div>

  <div class="menu-title">루비 공헌</div>
  <div class="menu-item" onclick="showRuby(); menuClick(this)">루비 공헌 순위</div>

</div>

<!-- 메인 -->
<div class="main">

  <!-- 메인 -->
  <div id="mainPage">

    <div class="title">DOG & CAT 결사원 리스트</div>
    <div class="sub">갱신 날짜: -<br>서버: 아민타5</div>

    <table>
      <thead>
        <tr>
          <th>결사</th>
          <th>캐릭터</th>
          <th>레벨</th>
          <th>직업</th>
          <th>토벌</th>
        </tr>
      </thead>
      <tbody id="playerList"></tbody>
    </table>

  </div>

  <!-- 루비 -->
  <div id="rubyPage">

    <div class="title">루비 공헌 순위</div>

    <!-- 필터 (JS가 찾는 id 그대로 유지) -->
    <div class="center">
      <select id="groupFilter">
        <option value="all">전체</option>
        <option value="DOG">DOG</option>
        <option value="CAT">CAT</option>
      </select>

      <select id="seasonFilter"></select>
      <select id="weekFilter"></select>
    </div>

    <!-- 게이지 -->
    <div class="bar-wrap">
      <div id="rubyBar" class="bar"></div>
    </div>

    <div class="center" id="rubyText"></div>
    <div class="center" id="rubyPercent"></div>

    <!-- 테이블 -->
    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>시즌</th>
          <th>주차</th>
          <th>결사</th>
          <th>닉네임</th>
          <th>총누적</th>
          <th>주차공헌</th>
        </tr>
      </thead>
      <tbody id="rubyTable"></tbody>
    </table>

  </div>

</div>

<script>
function menuClick(el){
  document.querySelectorAll(".menu-item").forEach(e=>{
    e.classList.remove("active");
  });
  el.classList.add("active");
}
</script>

<script src="script.js"></script>
<script src="ruby.js"></script>

</body>
</html>
