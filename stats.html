<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DOG & CAT 결사 통계</title>

<style>

body{
background:#212121;
color:white;
font-family:Arial;
margin:0;
padding:20px;
text-align:center;
}

h1{
margin-bottom:5px;
}

.info{
color:#aaa;
margin-bottom:30px;
}

.container{

display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;

}

.card{

background:#2b2b2b;
padding:20px;
border-radius:10px;
width:300px;

}

.card h2{

margin-top:0;
border-bottom:1px solid #444;
padding-bottom:10px;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:8px;
border-bottom:1px solid #444;

}

th{

background:#333;

}

</style>

</head>

<body>

<h1>📊 DOG & CAT 결사 통계</h1>

<div class="info">

갱신 : <span id="updateTime"></span><br>
서버 : 아민타5

</div>

<div class="container">

<div class="card">
<h2>레벨 통계</h2>
<div id="levelStats"></div>
</div>

<div class="card">
<h2>직업 통계</h2>
<div id="classStats"></div>
</div>

<div class="card">
<h2>토벌 통계</h2>
<div id="gradeStats"></div>
</div>

</div>

<script src="stats.js"></script>

</body>
</html>
